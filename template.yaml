AWSTemplateFormatVersion: '2010-09-09'
Transform: AWS::Serverless-2016-10-31
Description: Medallion Data Platform - Bronze, Silver and Gold layer

Resources:

  # S3 Bucket for collecting raw data 
  # MedallionDataPlatform:
  #   Type: AWS::S3::Bucket
  #   # keep the bucket and its contents when the stack is deleted
  #   DeletionPolicy: Retain  
  #   UpdateReplacePolicy: Retain
  #   Properties:
  #     BucketName: medallion-data-platform

  # Hacker News Orchestrator - triggers every day at midnight
  HackernewsOrchestrator:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: hackernews-orchestrator
      Architectures:
        - x86_64
      CodeUri: ./bronze/hackernews/orchestrator/
      Handler: lambda_function.lambda_handler
      Runtime: python3.14
      MemorySize: 128
      Timeout: 300
      Environment:
        Variables:
          SQS_QUEUE_URL: !GetAtt HackernewsWorkerQueue.QueueUrl
      Policies:
        - S3WritePolicy:
            BucketName: medallion-data-platform
        - SQSSendMessagePolicy:
            QueueName: !GetAtt HackernewsWorkerQueue.QueueName
      Events:
        ScheduleEvent:
          Type: Schedule
          Properties:
            Schedule: "cron(0 0 * * ? *)"

  # SQS Queue - queue between orchestrator and worker
  HackernewsWorkerQueue:
    Type: AWS::SQS::Queue
    Properties:
      QueueName: hackernews-worker-queue
      VisibilityTimeout: 120

  # Hacker News Worker - triggered by SQS queue
  HackernewsWorker:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: hackernews-worker
      Architectures:
        - x86_64
      CodeUri: ./bronze/hackernews/worker/
      Handler: lambda_function.lambda_handler
      Runtime: python3.14
      MemorySize: 128
      Timeout: 120
      Policies:
        - S3CrudPolicy:
            BucketName: medallion-data-platform
        - LambdaInvokePolicy:
            FunctionName: hackernews-merger
      Events:
        SQSEvent:
          Type: SQS
          Properties:
            Queue: !GetAtt HackernewsWorkerQueue.Arn
            BatchSize: 1

  # Hacker News Merger - triggers every day at 00:15 UTC
  HackernewsMerger:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: hackernews-merger
      Architectures:
        - x86_64
      CodeUri: ./bronze/hackernews/merger/
      Handler: lambda_function.lambda_handler
      Runtime: python3.14
      MemorySize: 128
      Timeout: 60
      Policies:
        - S3CrudPolicy:
            BucketName: medallion-data-platform

  # Twitter Orchestrator - triggers every day at midnight
  TwitterOrchestrator:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: twitter-orchestrator
      Architectures:
        - x86_64
      CodeUri: ./bronze/twitter/orchestrator/
      Handler: lambda_function.lambda_handler
      Runtime: python3.14
      MemorySize: 1024
      Timeout: 600
      Policies:
        - S3CrudPolicy:
            BucketName: medallion-data-platform
        - LambdaInvokePolicy:
            FunctionName: twitter-merger
      Events:
        ScheduleEvent:
          Type: Schedule
          Properties:
            Schedule: "cron(0 0 * * ? *)"

  # Twitter Merger - event driven, triggered by orchestrator
  TwitterMerger:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: twitter-merger
      Architectures:
        - x86_64
      CodeUri: ./bronze/twitter/merger/
      Handler: lambda_function.lambda_handler
      Runtime: python3.14
      MemorySize: 1024
      Timeout: 600
      Policies:
        - S3CrudPolicy:
            BucketName: medallion-data-platform